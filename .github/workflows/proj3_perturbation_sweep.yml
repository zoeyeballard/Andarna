# Project 3 · Tier 4 — Perturbation Sweep (Project 2 ↔ Project 3 bridge)
#
# Reuses Project 2's sensor-degradation module (openvla-robustness/robustness, pure
# NumPy) against Project 3's ACT policy: each camera frame is degraded upstream of the
# policy, and we measure the success-rate-vs-severity curve and the degradation "cliff".
#
# Runs on CPU (ubuntu-latest) — the earlier scaffold assumed a GPU, but that was only
# true of Project 2's 7B OpenVLA study; the ACT policy + NumPy degradations run fine on
# the same runners as Tiers 1-3. It is workflow_dispatch + scheduled (not per-PR): a
# multi-level sweep is heavier than a single nominal eval. Gated on RTI_CHECKPOINT_PATH.
name: "Project 3 · Tier 4 — Perturbation Sweep"

on:
  workflow_dispatch:
    inputs:
      axis:
        description: "Degradation axis (noise | latency | gap | resolution)"
        default: "resolution"
      num_episodes:
        description: "Episodes per severity level"
        default: "5"
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  perturbation-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4 # full repo: needs BOTH openvla-robustness/ and robotics-test-infra/

      - name: Gate on checkpoint configuration
        id: gate
        run: |
          if [ -z "${{ vars.RTI_CHECKPOINT_PATH }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RTI_CHECKPOINT_PATH not set — skipping perturbation sweep."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.configured == 'true'
        with:
          python-version: "3.12"

      - name: System libs for headless MuJoCo (OSMesa)
        if: steps.gate.outputs.configured == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libgl1 libosmesa6 libglfw3 libgl1-mesa-dri ffmpeg

      - name: Install sim stack (CPU torch/torchvision from the PyTorch CPU index)
        if: steps.gate.outputs.configured == 'true'
        working-directory: robotics-test-infra
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch==2.10.0" "torchvision==0.25.0"
          pip install ".[sim]"

      - name: Run perturbation sweep
        if: steps.gate.outputs.configured == 'true'
        working-directory: robotics-test-infra
        env:
          RTI_CHECKPOINT_PATH: ${{ vars.RTI_CHECKPOINT_PATH }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MUJOCO_GL: osmesa
          PYOPENGL_PLATFORM: osmesa
        run: |
          python scripts/run_perturbation_sweep.py \
            --axis "${{ github.event.inputs.axis || 'resolution' }}" \
            --num_episodes "${{ github.event.inputs.num_episodes || '5' }}" \
            --max_episode_steps 400 --seed 100000 --output_dir artifacts
          echo "### Perturbation sweep" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/perturbation_comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sweep artifacts
        if: always() && steps.gate.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: perturbation-sweep-${{ github.run_id }}
          path: |
            robotics-test-infra/artifacts/perturbation_*.csv
            robotics-test-infra/artifacts/perturbation_*.json
            robotics-test-infra/artifacts/perturbation_comment.md
          if-no-files-found: warn
